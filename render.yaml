services:
  - type: web
    name: hermes-gateway
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install discord.py aiohttp
    startCommand: python hermes_lite.py
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
